<!doctype html>
<html>
    <head>
        {% if titre %}
        <title>{{ titre }} - OnlyFacts</title>
        {% else %}
        <title>Bienvenue dans OnlyFacts!</title>
        {% endif %}
    </head>
    <body>
        <h1>Salut, {{ utilisateur.nom }}!</h1>
        {% for post in posts %}
        <div><p>{{ post.author.username }} says: <b>{{ post.body }}</b></p></div>
        {% endfor %}
    </body>
</html>
